name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        # The proton-vpn-local-agent dep is built from
        # vendor/local-agent-rs via maturin, which needs cargo.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/local-agent-rs/python-proton-vpn-local-agent/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/local-agent-rs/**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q
