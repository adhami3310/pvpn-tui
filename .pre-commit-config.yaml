# pre-commit hooks. Install once with:
#
#     uv run pre-commit install
#
# Hooks below shell out to the project's `uv` venv, so the ruff and
# pyright versions used at commit time are exactly the ones pinned in
# pyproject.toml — no separate copies in pre-commit's own envs.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
