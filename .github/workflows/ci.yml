name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # Top-level only. local-agent-rs has private nested submodules
          # (`../integration/devtools.git`, `../integration/ci-libraries-rust.git`)
          # that aren't published on GitHub; the binding crate doesn't
          # need them.
          submodules: true

      - name: Install Rust toolchain
        # The proton-vpn-local-agent dep is built from
        # vendor/local-agent-rs via maturin, which needs cargo.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/local-agent-rs/python-proton-vpn-local-agent/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/local-agent-rs/**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: 3.14

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q
